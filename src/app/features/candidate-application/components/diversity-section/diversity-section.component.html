<section class="form-section" [formGroup]="formGroup">
  <h2>Personal Information Questions</h2>

  <div class="form-grid three-column">
    <div class="form-field">
      <label for="dateOfBirth">Date of Birth</label>
      <input id="dateOfBirth" type="date" formControlName="dateOfBirth" />
    </div>

    <div class="form-field">
      <label for="genderIdentity">Gender Identity</label>
      <input id="genderIdentity" type="text" formControlName="genderIdentity" />
    </div>

    <div class="form-field">
      <label for="disability">Disability</label>
      <input id="disability" type="text" formControlName="disability" />
    </div>

    <div class="form-field">
      <label for="militaryService">Military Service</label>
      <input id="militaryService" type="text" formControlName="militaryService" />
    </div>
  </div>
</section>
