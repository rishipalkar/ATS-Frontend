<div class="content-card relative">
  <span class="badge">PORTFOLIO</span>
  <h2 class="card-title">Projects & Accomplishments</h2>

  <div class="form-body">
    <div class="form-row">
      <div class="form-group flex-2">
        <label>PROJECT TITLE</label>
        <input type="text" [(ngModel)]="newProject.title" placeholder="e.g., Applicant Tracking System (ATS)">
      </div>
      <div class="form-group flex-1">
        <label>CATEGORY</label>
        <input type="text" [(ngModel)]="newProject.category" placeholder="e.g., Web Development, MERN Stack">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group flex-1">
        <label>DURATION (MONTHS)</label>
        <input type="number" [(ngModel)]="newProject.months" placeholder="e.g., 3">
      </div>
      <div class="form-group flex-1">
        <label>TEAM SIZE</label>
        <input type="number" [(ngModel)]="newProject.teamSize" placeholder="e.g., 4">
      </div>
    </div>

    <div class="form-group">
      <label>CLIENT / BRIEF INFO</label>
      <input type="text" [(ngModel)]="newProject.clientInfo" placeholder="e.g., Internal College Announcement Portal">
    </div>

    <button class="btn-secondary mt-2" (click)="addProject()">+ Add Project</button>
  </div>

  <hr class="divider">

  <div class="records-list">
    <div class="record-card" *ngFor="let project of projects; let i = index">
      <div class="record-details">
        <h3>{{ project.title }}</h3>
        <p>{{ project.category }} | {{ project.months ? project.months + ' Months' : 'Ongoing' }} | Team: {{ project.teamSize }}</p>
        <p class="text-sm mt-1 text-gray-500">{{ project.clientInfo }}</p>
      </div>
      <div class="record-actions">
        <button class="btn-upload-sm" (click)="openDetailsModal(project)">
          📝 Add Details
        </button>
        <button class="delete-btn" (click)="removeProject(i)">×</button>
      </div>
    </div>
  </div>

  <div class="submit-section">
    <hr class="divider">
    <button class="btn-submit-massive" (click)="submitCompleteProfile()">
       Submit Complete Profile
    </button>
  </div>
</div>

<div class="modal-overlay" *ngIf="showDetailsModal && activeProject">
  <div class="modal-content">
    
    <div class="modal-header">
      <h2>Project Details</h2>
      <button class="close-modal-btn" (click)="closeDetailsModal()">×</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>SELECTED PROJECT</label>
        <input type="text" [value]="activeProject.title" disabled class="disabled-input">
      </div>

      <div class="form-row mt-2">
        <div class="form-group flex-1">
          <label>START DATE</label>
          <input type="month" [(ngModel)]="activeProject.details.startDate">
        </div>
        <div class="form-group flex-1">
          <label>END DATE</label>
          <input type="month" [(ngModel)]="activeProject.details.endDate">
        </div>
      </div>

      <div class="form-group mt-2">
        <label>YOUR ROLE</label>
        <input type="text" [(ngModel)]="activeProject.details.role" placeholder="e.g., Lead Backend Developer">
      </div>

      <div class="form-group mt-2">
        <label>BRIEF DESCRIPTION</label>
        <textarea [(ngModel)]="activeProject.details.description" placeholder="Describe the architecture, features, and your specific contributions..."></textarea>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeDetailsModal()">Cancel</button>
      <button class="btn-primary" (click)="saveProjectDetails()">Save Details</button>
    </div>

  </div>
</div>
