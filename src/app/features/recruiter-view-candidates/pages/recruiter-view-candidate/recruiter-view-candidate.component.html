<div class="main">
  worl
  <table class="candidate-table">
    <thead>
      <tr>
        <th><input type="checkbox" (change)="toggleSelectAll($event)" /></th>
        <th>Name</th>
        <th>Experience</th>
        <th>ATS Score</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of paginatedCandidates">
        <td>
          <input type="checkbox" [(ngModel)]="c.selected" [disabled]="c.status === 'Completed'" />
        </td>
        <td class="name-cell">{{ c.name }}</td>
        <td>{{ c.experience }} yrs</td>
        <td>
          <span *ngIf="c.status === 'Completed'; else notScanned" class="score-text">
            {{ c.atsScore }}%
          </span>
          <ng-template #notScanned><span class="muted">--</span></ng-template>
        </td>
        <td>
          <span class="status-pill" [ngClass]="c.status.toLowerCase()">
            {{ c.status }}
          </span>
        </td>
        <td>
          <div class="action-group">
            <button *ngIf="c.status === 'Completed'" class="btn-view" (click)="viewReport(c)">
              View Report
            </button>
            <button *ngIf="c.status === 'Pending'" class="btn-scan" (click)="onScan(c)">
              Scan Resume
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="pagination-footer">
    <p>Showing {{paginatedCandidates.length}} of {{candidates.length}} candidates</p>
    <div class="nav-btns">
      <button [disabled]="currentPage === 1" (click)="prevPage()">Previous</button>
      <span class="page-num">{{currentPage}}</span>
      <button [disabled]="(currentPage * pageSize) >= candidates.length" (click)="nextPage()">Next</button>
    </div>
  </div>
</div>
