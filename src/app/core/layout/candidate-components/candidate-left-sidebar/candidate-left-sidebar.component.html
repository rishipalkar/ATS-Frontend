<aside class="sidebar-left" [style.width.px]="sidebarWidth">
  <div class="sidebar-content">
    <div class="brand-section">
      <div class="logo-box">TF</div>
      <span class="brand-name" *ngIf="sidebarWidth > 180">TalentFlow</span>
    </div>

    <nav class="nav-group">
      <a routerLink="/candidate/dashboard" routerLinkActive="active" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="label" *ngIf="sidebarWidth > 160">Dashboard</span>
      </a>

      <a routerLink="/candidate/jobs" routerLinkActive="active" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="label" *ngIf="sidebarWidth > 160">Browse Jobs</span>
      </a>

      <a routerLink="/candidate/applications" routerLinkActive="active" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
        <span class="label" *ngIf="sidebarWidth > 160">My Applications</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-pill" (click)="onLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span *ngIf="sidebarWidth > 160">Sign Out</span>
      </button>
    </div>
  </div>

  <div class="resize-gutter" (mousedown)="startResizing($event)">
    <div class="visual-indicator"></div>
  </div>
</aside>
