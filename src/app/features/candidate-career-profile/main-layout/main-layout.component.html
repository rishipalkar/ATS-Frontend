<div class="career-layout-wrapper"> 
  <main class="main-content-area">
    <router-outlet></router-outlet>
  </main>

  <aside class="sidebar-area">
    
    <!-- ── Upload Section ──────────────────────────────────────────── -->
<div class="upload-wrapper">
  <input
    type="file"
    hidden
    #fileInput
    (change)="onFileSelected($event)"
    accept=".pdf">

  <button
    class="btn-upload"
    (click)="fileInput.click()"
    [disabled]="isUploading">

    <!-- Spinner while uploading -->
    <ng-container *ngIf="isUploading; else uploadIcon">
      <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      Parsing Resume...
    </ng-container>

    <ng-template #uploadIcon>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload Resume
    </ng-template>
  </button>

  <!-- Success message -->
  <span *ngIf="uploadSuccess" class="upload-success">
     Resume parsed — fields prefilled below
  </span>

  <!-- Error message -->
  <span *ngIf="uploadError" class="upload-error">
     {{ uploadError }}
  </span>
</div>

<!-- ── Prefilled Profile Fields ────────────────────────────────── -->
<!-- These fill automatically after upload -->

    
    <div class="completion-card">
      <h3>Profile Completion</h3>
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="completionPercentage"></div>
      </div>
    </div>

    
    <nav class="sidebar-nav">
      
      <a routerLink="./profile" routerLinkActive="active-link" class="nav-item">
        Candidate Details
        <span class="check-mark" *ngIf="completionPercentage >= 20">✓</span>
      </a>

      <a routerLink="./responsibilities" routerLinkActive="active-link" class="nav-item">
        Responsibilities & KRAs 
        <span class="check-mark" *ngIf="completionPercentage >= 20">✓</span>
      </a>
      
      <a routerLink="./skills" routerLinkActive="active-link" class="nav-item">
        Skills & Competencies 
        <span class="check-mark" *ngIf="completionPercentage >= 40">✓</span>
      </a>
      
      <a routerLink="./employment-records" routerLinkActive="active-link" class="nav-item">
        Employment Records
        <span class="check-mark" *ngIf="completionPercentage >= 60">✓</span>
      </a>
      
      <a routerLink="./education" routerLinkActive="active-link" class="nav-item">
        Education & Certifications
        <span class="check-mark" *ngIf="completionPercentage >= 80">✓</span>
      </a>
      
      <a routerLink="./projects" routerLinkActive="active-link" class="nav-item border-none">
        Projects & Accomplishments
        <span class="check-mark" *ngIf="completionPercentage === 100">✓</span>
      </a>
    </nav>

    <button class="btn-save" (click)="saveAllChanges()">Save Changes</button>
    
  </aside>

</div>
